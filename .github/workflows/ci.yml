# CI pipeline for flutter_text_sniffer.
# Runs analysis, formatting, tests (100% coverage) and a publish dry-run on
# every push/PR. Actual publishing to pub.dev is handled by release.yml, which
# auto-tags and publishes when the pubspec version is bumped on main.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Analyze & Test
  # ──────────────────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Enforce 100% line coverage
        run: |
          FILE=coverage/lcov.info
          TOTAL=$(grep -c '^DA:' "$FILE")
          HIT=$(awk -F, '/^DA:/ && $2+0 > 0' "$FILE" | wc -l | tr -d ' ')
          PCT=$(awk -v h="$HIT" -v t="$TOTAL" 'BEGIN{printf "%.1f", t>0 ? 100*h/t : 0}')
          echo "Line coverage: $HIT/$TOTAL ($PCT%)"
          if [ "$HIT" -ne "$TOTAL" ]; then
            echo "::error::Coverage is $PCT% ($HIT/$TOTAL); 100% required."
            awk -F, '/^SF:/{f=$0} /^DA:/ && $2+0==0 {print "  uncovered:", f, "line", $1}' "$FILE" | sed 's|SF:.*/lib/|lib/|'
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # Job 2: Validate pub.dev score (dry-run)
  # ──────────────────────────────────────────────
  dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: analyze-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dry-run publish
        run: dart pub publish --dry-run
